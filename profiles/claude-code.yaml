name: claude-code
version: "1.0"
description: Behavioral profile for Claude Code AI coding agent

# Default policy: allow, since Claude Code needs broad filesystem access for
# legitimate coding tasks. Vigil enforces a hard deny list for sensitive resources.
default_policy: allow

# entry_comm is the agent's root process. vigil uses BPF process lineage
# tracking to follow claude and all its descendants (node, bun, sh, git, ...).
entry_comm: claude

# watched_comms is kept as a fallback for kernels without lineage support.
watched_comms:
  - bun
  - node
  - claude

# Denied paths — kernel blocks these before the open() completes
denied_paths:
  # Credential files
  - /etc/shadow
  - /etc/sudoers
  - /etc/sudoers.d/**
  - /root/.ssh/**
  - /home/*/.ssh/**
  - /proc/*/mem

  # Cloud provider credentials
  - /**/.aws/credentials
  - /**/.aws/config
  - /**/.gcp/**
  - /**/.config/gcloud/**
  - /run/secrets/**

  # Crypto / GPG keys
  - /**/.gnupg/**
  - /**/.age/**

  # Other agents' credentials
  - /**/.config/gemini/**
  - /**/.anthropic/**

# Allowed paths (informational — enforced by userspace detector only)
allowed_paths:
  - /home/**
  - /tmp/**
  - /usr/**
  - /lib/**
  - /lib64/**
  - /opt/**
  - /proc/self/**
  - /proc/*/stat
  - /proc/*/status
  - /dev/null
  - /dev/urandom
  - /dev/random
  - /etc/resolv.conf
  - /etc/hosts
  - /etc/hostname
  - /etc/nsswitch.conf
  - /etc/ssl/certs/**
  - /etc/ca-certificates/**

# Allowed outbound networks (Anthropic API + package registries + localhost)
allowed_networks:
  - 127.0.0.0/8
  - ::1/128
  # Anthropic API (api.anthropic.com resolves to various AWS IPs — permit all
  # outbound on 443; vigil will log every connection for audit)
  - 0.0.0.0/0

# Allowed subprocesses
allowed_commands:
  - claude
  - node
  - git
  - go
  - python3
  - python
  - make
  - gcc
  - clang
  - npm
  - npx
