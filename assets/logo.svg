<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0e1b2e"/>
      <stop offset="100%" stop-color="#060b12"/>
    </radialGradient>
    <radialGradient id="irisGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00cc88" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="360" height="360" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="360" height="360" rx="28" fill="url(#bgGrad)"/>

  <!-- Subtle hex-grid dots in background -->
  <g fill="#00ffaa" fill-opacity="0.06" clip-path="url(#clip)">
    <circle cx="36" cy="36" r="1.5"/> <circle cx="72" cy="36" r="1.5"/> <circle cx="108" cy="36" r="1.5"/>
    <circle cx="144" cy="36" r="1.5"/> <circle cx="180" cy="36" r="1.5"/> <circle cx="216" cy="36" r="1.5"/>
    <circle cx="252" cy="36" r="1.5"/> <circle cx="288" cy="36" r="1.5"/> <circle cx="324" cy="36" r="1.5"/>
    <circle cx="54" cy="62" r="1.5"/> <circle cx="90" cy="62" r="1.5"/> <circle cx="126" cy="62" r="1.5"/>
    <circle cx="162" cy="62" r="1.5"/> <circle cx="198" cy="62" r="1.5"/> <circle cx="234" cy="62" r="1.5"/>
    <circle cx="270" cy="62" r="1.5"/> <circle cx="306" cy="62" r="1.5"/>
    <circle cx="36" cy="88" r="1.5"/> <circle cx="72" cy="88" r="1.5"/> <circle cx="108" cy="88" r="1.5"/>
    <circle cx="144" cy="88" r="1.5"/> <circle cx="216" cy="88" r="1.5"/> <circle cx="252" cy="88" r="1.5"/>
    <circle cx="288" cy="88" r="1.5"/> <circle cx="324" cy="88" r="1.5"/>
    <circle cx="54" cy="114" r="1.5"/> <circle cx="90" cy="114" r="1.5"/>
    <circle cx="270" cy="114" r="1.5"/> <circle cx="306" cy="114" r="1.5"/>
    <circle cx="36" cy="320" r="1.5"/> <circle cx="72" cy="320" r="1.5"/> <circle cx="108" cy="320" r="1.5"/>
    <circle cx="144" cy="320" r="1.5"/> <circle cx="180" cy="320" r="1.5"/> <circle cx="216" cy="320" r="1.5"/>
    <circle cx="252" cy="320" r="1.5"/> <circle cx="288" cy="320" r="1.5"/> <circle cx="324" cy="320" r="1.5"/>
  </g>

  <!-- Outer ambient glow around eye -->
  <ellipse cx="180" cy="152" rx="105" ry="78" fill="url(#irisGlow)"/>

  <!-- Far outer ring (faint) -->
  <ellipse cx="180" cy="152" rx="118" ry="88" fill="none" stroke="#00ffaa" stroke-width="0.6" stroke-opacity="0.12"/>

  <!-- Eye outer contour — almond shape -->
  <path d="M 52 152 Q 116 68 180 68 Q 244 68 308 152 Q 244 236 180 236 Q 116 236 52 152 Z"
        fill="none" stroke="#00ffaa" stroke-width="1.8" stroke-opacity="0.95" filter="url(#glow)"/>

  <!-- Iris outer ring -->
  <circle cx="180" cy="152" r="54" fill="none" stroke="#00ffaa" stroke-width="1.2" stroke-opacity="0.55" filter="url(#glow)"/>

  <!-- Iris tick marks (targeting reticle) -->
  <g stroke="#00ffaa" stroke-width="1" stroke-opacity="0.5" filter="url(#glow)">
    <!-- Top -->    <line x1="180" y1="95"  x2="180" y2="103"/>
    <!-- Bottom --> <line x1="180" y1="201" x2="180" y2="209"/>
    <!-- Left -->   <line x1="123" y1="152" x2="131" y2="152"/>
    <!-- Right -->  <line x1="229" y1="152" x2="237" y2="152"/>
    <!-- NE -->     <line x1="217" y1="109" x2="212" y2="114"/>
    <!-- NW -->     <line x1="143" y1="109" x2="148" y2="114"/>
    <!-- SE -->     <line x1="217" y1="195" x2="212" y2="190"/>
    <!-- SW -->     <line x1="143" y1="195" x2="148" y2="190"/>
  </g>

  <!-- Iris inner ring -->
  <circle cx="180" cy="152" r="38" fill="none" stroke="#00ffaa" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Iris fill glow -->
  <circle cx="180" cy="152" r="26" fill="#00ffaa" fill-opacity="0.07"/>

  <!-- Pupil ring -->
  <circle cx="180" cy="152" r="26" fill="none" stroke="#00ffaa" stroke-width="1.6" stroke-opacity="0.9" filter="url(#glow)"/>

  <!-- Pupil fill -->
  <circle cx="180" cy="152" r="22" fill="url(#pupilGlow)" filter="url(#strongGlow)"/>

  <!-- Pupil dark center -->
  <circle cx="180" cy="152" r="12" fill="#060b12"/>

  <!-- Specular highlight -->
  <circle cx="186" cy="147" r="4" fill="#ffffff" fill-opacity="0.25"/>

  <!-- Horizontal scan line through eye -->
  <line x1="57" y1="152" x2="303" y2="152" stroke="#00ffaa" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- Circuit traces — top -->
  <polyline points="180,114 180,93 204,93 204,74 224,74"
            fill="none" stroke="#00ffaa" stroke-width="0.9" stroke-opacity="0.38"/>
  <circle cx="224" cy="74" r="2.5" fill="#00ffaa" fill-opacity="0.5"/>
  <circle cx="204" cy="74" r="1.5" fill="#00ffaa" fill-opacity="0.3"/>

  <!-- Circuit traces — top left -->
  <polyline points="148,106 132,106 132,84 112,84 112,66"
            fill="none" stroke="#00ffaa" stroke-width="0.9" stroke-opacity="0.3"/>
  <circle cx="112" cy="66" r="2.5" fill="#00ffaa" fill-opacity="0.4"/>

  <!-- Circuit traces — top right -->
  <polyline points="214,108 236,108 236,88 256,88"
            fill="none" stroke="#00ffaa" stroke-width="0.9" stroke-opacity="0.3"/>
  <circle cx="256" cy="88" r="2.5" fill="#00ffaa" fill-opacity="0.4"/>

  <!-- Circuit traces — left -->
  <polyline points="98,138 72,138 72,118 50,118"
            fill="none" stroke="#00ffaa" stroke-width="0.9" stroke-opacity="0.25"/>
  <circle cx="50" cy="118" r="2" fill="#00ffaa" fill-opacity="0.35"/>

  <!-- Circuit traces — right -->
  <polyline points="262,138 288,138 288,118 310,118"
            fill="none" stroke="#00ffaa" stroke-width="0.9" stroke-opacity="0.25"/>
  <circle cx="310" cy="118" r="2" fill="#00ffaa" fill-opacity="0.35"/>

  <!-- Corner bracket — top left -->
  <path d="M 22 48 L 22 22 L 48 22" fill="none" stroke="#00ffaa" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="22" cy="22" r="2" fill="#00ffaa" fill-opacity="0.3"/>

  <!-- Corner bracket — top right -->
  <path d="M 312 22 L 338 22 L 338 48" fill="none" stroke="#00ffaa" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="338" cy="22" r="2" fill="#00ffaa" fill-opacity="0.3"/>

  <!-- Corner bracket — bottom left -->
  <path d="M 22 312 L 22 338 L 48 338" fill="none" stroke="#00ffaa" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="22" cy="338" r="2" fill="#00ffaa" fill-opacity="0.3"/>

  <!-- Corner bracket — bottom right -->
  <path d="M 312 338 L 338 338 L 338 312" fill="none" stroke="#00ffaa" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="338" cy="338" r="2" fill="#00ffaa" fill-opacity="0.3"/>

  <!-- "vigil" main text -->
  <text x="180" y="294"
        font-family="'SF Mono', 'Fira Code', 'Menlo', 'Courier New', monospace"
        font-size="52"
        font-weight="700"
        fill="#e8f2ff"
        text-anchor="middle"
        letter-spacing="10"
        filter="url(#textGlow)">vigil</text>

  <!-- Tagline -->
  <text x="180" y="322"
        font-family="'SF Mono', 'Fira Code', 'Menlo', 'Courier New', monospace"
        font-size="10"
        fill="#00ffaa"
        fill-opacity="0.7"
        text-anchor="middle"
        letter-spacing="4.5">eBPF  ·  AI SECURITY</text>
</svg>
