name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bpf-build:
    name: Build eBPF Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) \
            linux-tools-$(uname -r) linux-tools-common build-essential libelf-dev zlib1g-dev

      - name: Install bpftool
        run: |
          # /usr/sbin/bpftool is a wrapper script that fails on kernel version mismatch.
          # Search only in linux-tools subdirectories for the actual ELF binary.
          BPFTOOL_BIN=$(find /usr/lib/linux-tools -maxdepth 3 \
            -name bpftool -executable 2>/dev/null | head -1)

          if [ -z "$BPFTOOL_BIN" ]; then
            echo "bpftool ELF not found — building from libbpf/bpftool v7.4.0..."
            sudo apt-get install -y git
            git clone --depth 1 --recurse-submodules --shallow-submodules \
              --branch v7.4.0 \
              https://github.com/libbpf/bpftool.git /tmp/bpftool-src
            make -C /tmp/bpftool-src/src -j$(nproc)
            sudo make -C /tmp/bpftool-src/src install
            BPFTOOL_BIN=$(which bpftool 2>/dev/null || echo /usr/local/sbin/bpftool)
          fi

          sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          /usr/local/bin/bpftool --version

      - name: Generate vmlinux.h
        run: /usr/local/bin/bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Build eBPF programs
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86/' | sed 's/aarch64/arm64/')
          clang -g -O2 -target bpf -D__TARGET_ARCH_${ARCH} \
            -I./bpf/headers \
            -I/usr/include/$(uname -m)-linux-gnu \
            -c bpf/probe.c -o bpf/probe.bpf.o
          clang -g -O2 -target bpf -D__TARGET_ARCH_${ARCH} \
            -I./bpf/headers \
            -I/usr/include/$(uname -m)-linux-gnu \
            -c bpf/lsm.c -o bpf/lsm.bpf.o
          /usr/local/bin/bpftool gen object bpf/vigil.bpf.o bpf/probe.bpf.o bpf/lsm.bpf.o

      - name: Upload eBPF object
        uses: actions/upload-artifact@v4
        with:
          name: vigil-bpf
          path: bpf/vigil.bpf.o

  e2e:
    name: e2e Jailbreak Escape Test
    runs-on: ubuntu-latest
    needs: bpf-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download eBPF object
        uses: actions/download-artifact@v4
        with:
          name: vigil-bpf
          path: bpf/

      - name: Verify KVM is available
        run: |
          # GitHub-hosted ubuntu-latest runners expose /dev/kvm via nested virt.
          # If this fails the job is skipped rather than erroring the PR.
          if [ ! -e /dev/kvm ]; then
            echo "::warning::KVM not available on this runner — skipping e2e VM test"
            echo "KVM_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "KVM_AVAILABLE=true" >> $GITHUB_ENV
            ls -la /dev/kvm
          fi

      - name: Install QEMU and generic kernel with CONFIG_BPF_LSM=y
        if: env.KVM_AVAILABLE == 'true'
        run: |
          sudo apt-get update -qq
          # linux-image-generic on Ubuntu 22.04+ has CONFIG_BPF_LSM=y.
          # The azure kernel used by GitHub runners does not.
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 linux-image-generic

          VMLINUZ_SRC=$(ls /boot/vmlinuz-*-generic | sort -V | tail -1)
          KVER="${VMLINUZ_SRC#/boot/vmlinuz-}"
          echo "Using kernel: $VMLINUZ_SRC (version $KVER)"
          echo "KVER=$KVER" >> $GITHUB_ENV

          # Kernel config may be plain text or gzip-compressed depending on the build.
          CONFIG=$(ls /boot/config-*-generic | sort -V | tail -1)
          (zcat "$CONFIG" 2>/dev/null || cat "$CONFIG") | grep -q "^CONFIG_BPF_LSM=y" \
            || { echo "::error::linux-image-generic is missing CONFIG_BPF_LSM=y"; exit 1; }
          echo "CONFIG_BPF_LSM=y confirmed in generic kernel $KVER"

      - name: Install virtme-ng
        if: env.KVM_AVAILABLE == 'true'
        run: sudo pip install --break-system-packages virtme-ng

      - name: Write e2e runner script
        if: env.KVM_AVAILABLE == 'true'
        run: |
          # Write to the workspace so virtme-ng can find it via the 9p host mount.
          # Using a script file avoids quoting issues with --exec.
          GOROOT=$(go env GOROOT)
          cat > "$GITHUB_WORKSPACE/run-e2e-in-vm.sh" <<EOF
          #!/bin/bash
          set -euo pipefail
          export PATH=${GOROOT}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          cd $GITHUB_WORKSPACE
          exec go test -tags integration -v -count=1 ./test/e2e/
          EOF
          chmod +x "$GITHUB_WORKSPACE/run-e2e-in-vm.sh"

      - name: Run e2e test inside micro-VM with lsm=bpf
        if: env.KVM_AVAILABLE == 'true'
        run: |
          # --root-release tells vng to use the installed generic kernel by version.
          # --append injects lsm=bpf into the kernel cmdline before boot.
          # --exec runs our script as root inside the guest.
          # virtme-ng mounts the host filesystem via 9p, so the workspace,
          # Go toolchain, BPF object, and profiles are all accessible in the VM.
          sudo vng \
            --root-release "$KVER" \
            --append "lsm=bpf" \
            --exec "$GITHUB_WORKSPACE/run-e2e-in-vm.sh"

      - name: KVM unavailable notice
        if: env.KVM_AVAILABLE != 'true'
        run: |
          echo "::notice::e2e test skipped — KVM not available on this runner."
          echo "To run locally: boot Linux with 'lsm=bpf' and run 'sudo go test -tags integration -v ./test/e2e/'"
