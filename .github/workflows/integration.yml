name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bpf-build:
    name: Build eBPF Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) \
            linux-tools-$(uname -r) linux-tools-common build-essential libelf-dev zlib1g-dev

      - name: Install bpftool
        run: |
          # /usr/sbin/bpftool is a wrapper script that fails on kernel version mismatch.
          # Search only in linux-tools subdirectories for the actual ELF binary.
          BPFTOOL_BIN=$(find /usr/lib/linux-tools -maxdepth 3 \
            -name bpftool -executable 2>/dev/null | head -1)

          if [ -z "$BPFTOOL_BIN" ]; then
            echo "bpftool ELF not found — building from libbpf/bpftool v7.4.0..."
            sudo apt-get install -y git
            git clone --depth 1 --recurse-submodules --shallow-submodules \
              --branch v7.4.0 \
              https://github.com/libbpf/bpftool.git /tmp/bpftool-src
            make -C /tmp/bpftool-src/src -j$(nproc)
            sudo make -C /tmp/bpftool-src/src install
            BPFTOOL_BIN=$(which bpftool 2>/dev/null || echo /usr/local/sbin/bpftool)
          fi

          sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          /usr/local/bin/bpftool --version

      - name: Generate vmlinux.h
        run: /usr/local/bin/bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Build eBPF programs
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86/' | sed 's/aarch64/arm64/')
          clang -g -O2 -target bpf -D__TARGET_ARCH_${ARCH} \
            -I./bpf/headers \
            -I/usr/include/$(uname -m)-linux-gnu \
            -c bpf/probe.c -o bpf/probe.bpf.o
          clang -g -O2 -target bpf -D__TARGET_ARCH_${ARCH} \
            -I./bpf/headers \
            -I/usr/include/$(uname -m)-linux-gnu \
            -c bpf/lsm.c -o bpf/lsm.bpf.o
          /usr/local/bin/bpftool gen object bpf/vigil.bpf.o bpf/probe.bpf.o bpf/lsm.bpf.o

      - name: Upload eBPF object
        uses: actions/upload-artifact@v4
        with:
          name: vigil-bpf
          path: bpf/vigil.bpf.o

  e2e:
    name: e2e Jailbreak Escape Test
    runs-on: ubuntu-latest
    needs: bpf-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download eBPF object
        uses: actions/download-artifact@v4
        with:
          name: vigil-bpf
          path: bpf/

      - name: Verify KVM is available
        run: |
          # GitHub-hosted ubuntu-latest runners expose /dev/kvm via nested virt.
          # If this fails the job is skipped rather than erroring the PR.
          if [ ! -e /dev/kvm ]; then
            echo "::warning::KVM not available on this runner — skipping e2e VM test"
            echo "KVM_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "KVM_AVAILABLE=true" >> $GITHUB_ENV
            ls -la /dev/kvm
          fi

      - name: Install QEMU, busybox, and generic kernel with CONFIG_BPF_LSM=y
        if: env.KVM_AVAILABLE == 'true'
        run: |
          sudo apt-get update -qq
          # linux-image-generic on Ubuntu 22.04+ has CONFIG_BPF_LSM=y.
          # The azure kernel used by GitHub runners does not.
          # busybox-static provides the minimal init tooling for our custom initramfs.
          # zstd is needed to decompress *.ko.zst modules (Ubuntu 24.04 default).
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 busybox-static linux-image-generic zstd

          VMLINUZ=$(ls /boot/vmlinuz-*-generic | sort -V | tail -1)
          KVER="${VMLINUZ#/boot/vmlinuz-}"
          echo "VMLINUZ=$VMLINUZ" >> $GITHUB_ENV
          echo "KVER=$KVER" >> $GITHUB_ENV
          echo "Using kernel: $VMLINUZ ($KVER)"

          CONFIG=$(ls /boot/config-*-generic | sort -V | tail -1)
          (zcat "$CONFIG" 2>/dev/null || cat "$CONFIG") | grep -q "^CONFIG_BPF_LSM=y" \
            || { echo "::error::linux-image-generic is missing CONFIG_BPF_LSM=y"; exit 1; }
          echo "CONFIG_BPF_LSM=y confirmed"

      - name: Pre-download Go module dependencies
        if: env.KVM_AVAILABLE == 'true'
        run: go mod download
        working-directory: ${{ github.workspace }}

      - name: Build minimal initramfs
        if: env.KVM_AVAILABLE == 'true'
        run: |
          # Strategy: boot a tiny busybox initramfs that:
          #   1. loads virtio + 9p kernel modules (they are not built-in on Ubuntu)
          #   2. mounts the host filesystem via virtio-9p at /newroot
          #   3. pivot_root into it — this changes the VFS root so bpf_d_path
          #      returns real paths (/etc/passwd) not mount-prefixed ones
          #      (/host/etc/passwd) which would break BPF map lookups
          #   4. runs the e2e test, writes exit code, powers off
          GOROOT=$(go env GOROOT)
          GOPATH=$(go env GOPATH)
          GOMODCACHE=$(go env GOMODCACHE)
          WORKSPACE="$GITHUB_WORKSPACE"
          MDIR="/lib/modules/${KVER}"

          # Write the in-VM test runner (paths resolved on the host now).
          # GOPROXY=off ensures Go uses only the local cache — the VM has no internet.
          cat > "${WORKSPACE}/run-e2e-in-vm.sh" <<SCRIPT
          #!/bin/bash
          set -euo pipefail
          export PATH=${GOROOT}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          export GOPATH=${GOPATH}
          export GOMODCACHE=${GOMODCACHE}
          export GOPROXY=off
          export GONOSUMCHECK=*
          cd ${WORKSPACE}
          exec go test -tags integration -v -count=1 ./test/e2e/
          SCRIPT
          chmod +x "${WORKSPACE}/run-e2e-in-vm.sh"

          # Build the initramfs tree.
          D=$(mktemp -d)
          mkdir -p "${D}"/{bin,proc,sys,dev,newroot,lib/modules}
          cp /bin/busybox "${D}/bin/"
          for cmd in sh mount umount mkdir pivot_root poweroff insmod sync; do
            ln -sf busybox "${D}/bin/${cmd}"
          done

          # Embed 9p + dependency modules so init can insmod them before the 9p mount.
          # On Ubuntu 6.8 generic: virtio/virtio_pci are built-in (=y), so no .ko exists.
          # 9p.ko depends on fscache.ko which depends on netfs.ko — include the full chain.
          # Ubuntu 24.04 compresses modules as *.ko.zst; handle gz and plain too.
          for mod in netfs fscache 9pnet 9pnet_virtio 9p; do
            src=$(find "${MDIR}" -name "${mod}.ko*" 2>/dev/null | head -1)
            [ -z "$src" ] && echo "  (module ${mod} not found, skipping)" && continue
            case "$src" in
              *.ko.gz)  zcat "$src"          > "${D}/lib/modules/${mod}.ko" ;;
              *.ko.zst) zstd -d "$src" -o     "${D}/lib/modules/${mod}.ko" ;;
              *.ko)     cp   "$src"            "${D}/lib/modules/${mod}.ko" ;;
            esac
            echo "  embedded ${mod}.ko (from $(basename $src))"
          done

          cat > "${D}/init" <<INIT
          #!/bin/sh
          set -x
          export PATH=/bin
          mount -t proc  proc  /proc
          mount -t sysfs sysfs /sys
          mount -t devtmpfs devtmpfs /dev

          # tracefs required by cilium/ebpf for tracepoint attachment.
          mkdir -p /sys/kernel/debug /sys/kernel/tracing
          mount -t debugfs debugfs /sys/kernel/debug  || true
          mount -t tracefs tracefs /sys/kernel/tracing || true

          # Load 9p dependency chain in order: netfs → fscache → 9pnet → 9pnet_virtio → 9p
          # virtio/virtio_pci are built-in on Ubuntu generic, no insmod needed.
          for m in netfs fscache 9pnet 9pnet_virtio 9p; do
            [ -f /lib/modules/\${m}.ko ] && insmod /lib/modules/\${m}.ko || true
          done

          # pivot_root into the host filesystem (9p).
          # chroot changes the process view but leaves the kernel VFS root unchanged,
          # so bpf_d_path would return /host/etc/passwd instead of /etc/passwd,
          # breaking every BPF map lookup.  pivot_root changes the VFS root itself.
          mount -t 9p -o trans=virtio,version=9p2000.L,cache=mmap host9p /newroot
          mkdir -p /newroot/old_initrd
          cd /newroot
          pivot_root . old_initrd

          # Re-establish virtual filesystems under the new root.
          mount --move /old_initrd/proc /proc
          mount --move /old_initrd/sys  /sys
          mount --move /old_initrd/dev  /dev

          # Remount tracing interfaces (pivot_root does not carry submounts).
          mkdir -p /sys/kernel/debug /sys/kernel/tracing
          mount -t debugfs debugfs /sys/kernel/debug  || true
          mount -t tracefs tracefs /sys/kernel/tracing || true

          umount -l /old_initrd || true

          ${WORKSPACE}/run-e2e-in-vm.sh
          RC=\$?
          sync
          echo \$RC > /tmp/vm-exit-code
          sync
          poweroff -f
          INIT
          chmod +x "${D}/init"

          (cd "${D}" && find . | cpio -oH newc | gzip > /tmp/vigil-initrd.cpio.gz)
          echo "Initramfs: $(ls -lh /tmp/vigil-initrd.cpio.gz)"

      - name: Run e2e test inside micro-VM with lsm=bpf
        if: env.KVM_AVAILABLE == 'true'
        run: |
          # Boot the generic kernel (with CONFIG_BPF_LSM=y) under QEMU-KVM.
          # lsm=bpf activates BPF LSM hooks (required for inline blocking).
          # The host filesystem is shared read-write via virtio-9p so the guest
          # init can chroot into it and run the test as if on a native machine.
          # -no-reboot causes QEMU to exit when the guest powers off.
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -m 2G \
            -cpu host \
            -smp 2 \
            -nographic \
            -no-reboot \
            -kernel "$VMLINUZ" \
            -initrd /tmp/vigil-initrd.cpio.gz \
            -append "console=ttyS0 panic=-1 lsm=bpf quiet" \
            -fsdev local,id=host9p,path=/,security_model=none,multidevs=remap \
            -device virtio-9p-pci,fsdev=host9p,mount_tag=host9p

          VM_RC=$(cat /tmp/vm-exit-code 2>/dev/null || echo 1)
          echo "e2e exit code: ${VM_RC}"
          exit "${VM_RC}"

      - name: KVM unavailable notice
        if: env.KVM_AVAILABLE != 'true'
        run: |
          echo "::notice::e2e test skipped — KVM not available on this runner."
          echo "To run locally: boot Linux with 'lsm=bpf' and run 'sudo go test -tags integration -v ./test/e2e/'"
